/*************** 通用工具函数/类 ***************/

let KEY = Symbol('KEY') //用于验证只有框架本体具有的权限
let indexedDB = globalThis.indexedDB
delete globalThis.indexedDB

let IDBStorage = (()=>{
	//相比 idb-storage.js 增加了 KEY 验证、clear 方法
	Promise.fromIDBRequest ||= req =>
		new Promise((resolve, reject)=>{
			req.onsuccess = ()=>resolve(req.result)
			req.onerror = ()=>reject(req.error)
			req.$reject = reject
		})

	const dbPromises = Object.create(null)
	async function openDB(name, option={}){
		let {version, stores} = option
		if(!dbPromises[name]){
			let req = indexedDB.open(name, version)
			req.onupgradeneeded = () => stores && upgrade(req.result, stores)
			dbPromises[name] = Promise.fromIDBRequest(req)
			req.onblocked = ev => req.$reject(new Error('the openDB request is blocked', {cause:ev}))
			dbPromises[name].catch(err=>{
				delete dbPromises[name]
			})
		}
		let db = await dbPromises[name]
		if(version){
			if(db.version > version) //复用之前打开的 db 时可能发生
				throw new DOMException(`The requested version (${version}) is less than the existing version (${db.version}).`, 'VersionError')
			if(db.version < version){
				delete dbPromises[name]
				return openDB(name, option)
			}
		}
		if(stores && needUpgrade(db, stores)){
			if(db.version == version)
				throw new DOMException('指定的版本与 stores 不匹配')
			//未指定版本，自动升级
			delete dbPromises[name]
			return openDB(name, {
				version: db.version+1,
				stores
			})
		}
		db.onversionchange ||= ()=>{
			db.close()
			delete dbPromises[name]
		}
		return db
	}
	function upgrade(db, stores){
		//只能在 upgradeneeded 事件使用
		//创建缺少的store（多余的会忽略）
		for(let name of stores)
			if(!db.objectStoreNames.contains(name))
				db.createObjectStore(name)
	}
	function needUpgrade(db, stores){
		for(let name of stores)
			if(!db.objectStoreNames.contains(name))
				return true
	}

	class IDBStorage{
		static checkVersion(dbName, version, storeNames){
			//异步函数
			//若版本吻合，但 storeNames 不匹配则抛出错误
			//若当前版本低于期望的版本，则根据 storeNames 创建缺少的store（多余的会忽略）
			//若当前版本高于期望的版本，则抛出错误
			//成功则返回 db（不建议长期保留该引用）
			return openDB(dbName, {
				version,
				stores: storeNames
			})
		}
		constructor(dbName, storeName, key){
			//构造前建议先 checkVersion
			if(key != KEY)
				throw TypeError("Failed to construct 'IDBStorage': Illegal constructor")
			this.db = dbName
			this.store = storeName
			//openDB(this.db, {stores:[this.store]})
		}
		async getStore(mode){
			let db = await openDB(this.db, {stores:[this.store]})
			return db.transaction(this.store, mode).objectStore(this.store)
		}
		async get(key){
			let store = await this.getStore('readonly')
			return Promise.fromIDBRequest(store.get(key))
		}
		async getMany(keys){
			let store = await this.getStore('readonly')
			let promises = keys.map(key=>Promise.fromIDBRequest(store.get(key)))
			return Promise.all(promises)
		}
		async set(key, val){
			let store = await this.getStore('readwrite')
			return Promise.fromIDBRequest(store.put(val, key))
		}
		async setMany(entries){
			let store = await this.getStore('readwrite')
			let promises = entries.map(entry=>Promise.fromIDBRequest(store.put(entry[1], entry[0])))
			return Promise.all(promises)
		}
		async keys(){
			let store = await this.getStore('readonly')
			return Promise.fromIDBRequest(store.getAllKeys())
		}
		async entries(){
			let store = await this.getStore('readonly')
			let [keys, values] = await Promise.all([
				Promise.fromIDBRequest(store.getAllKeys()),
				Promise.fromIDBRequest(store.getAll())
			])
			return keys.map((key, i)=>[key, values[i]])
		}
		async update(key, updater){
			let store = await this.getStore('readwrite')
			let val = await Promise.fromIDBRequest(store.get(key))
			return Promise.fromIDBRequest(store.put(updater(val), key))
		}
		async del(key){
			let store = await this.getStore('readwrite')
			return Promise.fromIDBRequest(store.delete(key))
		}
		async delMany(keys){
			let store = await this.getStore('readwrite')
			let promises = keys.map(key=>Promise.fromIDBRequest(store.delete(key)))
			return Promise.all(promises)
		}
		async clear(){
			let store = await this.getStore('readwrite')
			return Promise.fromIDBRequest(store.clear())
		}
	}
	
	return IDBStorage
})();

function FileInput(accept){
	let input = document.createElement('input');
	input.type = 'file';
	input.accept = accept;
	return new Promise(resolve=>{
		input.click();
		input.addEventListener('change', ()=>resolve(input.files[0]));
	})
}
function DownloadBlob(file, name){
	let a = document.createElement('a');
	a.download = name;
	a.href = URL.createObjectURL(file);
	a.click();
	// 延迟 revoke 以避免部分浏览器中断下载
	setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
	a.remove();
}
XMLHttpRequest.prototype.getHeaders ||= function(){
	let str = this.getAllResponseHeaders().trim();
	let entries = [];
	for(let line of str.split('\r\n'))
		entries.push(line.split(': '));
	return new Headers(entries);
}
function XHRPromise(url, opts={}){
	let {method, body, onProgress, onUploadProgress, signal, timeout} = opts;
	let xhr = new XMLHttpRequest;
	xhr.open(method||'GET', url);
	xhr.responseType = 'blob';
	xhr.onprogress = onProgress;
	xhr.upload.onprogress = onUploadProgress;
	xhr.timeout = timeout;
	let abort_reason;
	function abort(reason='no reason'){
		abort_reason = reason;
		xhr.abort();
	}
	signal?.addEventListener('abort', ()=>abort(signal.reason));
	return new Promise((resolve, reject)=>{
		xhr.send(body);
		xhr.onload = ()=>resolve(new Response(xhr.response, {
			status: xhr.status,
			headers: xhr.getHeaders()
		}));
		xhr.onabort = ()=>reject(new DOMException(abort_reason, 'AbortError'));
		xhr.onerror = xhr.ontimeout = reject;
	});
}
async function split(blob){
	async function findNUL(){
		let buf_size = 256*1024 //每次读取 256KB
		let start = 0
		while(start < blob.size){
			let end = start+buf_size
			let buf = await blob.slice(start, end).arrayBuffer()
			let pos = new Uint8Array(buf).indexOf(0)
			if(pos >= 0)
				return start+pos
			start = end
		}
		throw new Error("no '\\0' found")
	}
	let pos = await findNUL()
	let str = await blob.slice(0, pos).text()
	return {
		meta: JSON.parse(str),
		blob: blob.slice(pos+1)
	}
}
function sleep(t){
	return new Promise(r=>setTimeout(r,t))
}
function applyCSS(text, doc=document){
	let ss = new CSSStyleSheet
	ss.replaceSync(text)
	doc.adoptedStyleSheets.push(ss)
	return ss
}
function importFont(family, font, format='opentype'){
	if(typeof font == 'string')
		font = Assets[font]
	if(!(font instanceof Blob))
		throw new TypeError('Invalid font: '+font)
	let url = URL.createObjectURL(font)
	applyCSS(`
	@font-face {
		font-family: "${family}";
		src: url("${url}") format("${format}");
	}`)
}
function $n(tag, data={}, content=null){
	let el = document.createElement(tag)
	for(let k in data){
		let v = data[k]
		if(k=='content'){
			content = v
		}else if(k=='style' && typeof v=='object'){
			Object.assign(el.style, v)
		}else if(k=='data' && typeof v=='object'){
			Object.assign(el.dataset, v)
		}else{
			el[k] = v
		}
	}
	if(content!=null){
		if(typeof content=='string')
			el.textContent = content
		else if(content instanceof Array)
			el.append(...content)
		else
			throw new TypeError('invalid content', {cause:content})
	}
	return el
}
let $ = new Proxy({}, {
	get(self, key){
		return self[key] ||= $n.bind(null, key)
	}
})
async function loadBlob(b, type){
	switch(type){
		case 'text': return b.text()
		case 'arrayBuffer': return b.arrayBuffer()
		case 'json':{
			let str = await b.text()
			return JSON.parse(str)
		}
		case 'bitmap': return createImageBitmap(b)
		case 'html': case 'xml':{
			let str = await b.text()
			let parser = new DOMParser
			return parser.parseFromString(str, 'text/'+type)
		}
		case 'blobURL': case 'objectURL': return URL.createObjectURL(b)
		case 'dataURL': return new Promise((resolve, reject) => {
			let reader = new FileReader
			reader.onload = ()=>resolve(reader.result)
			reader.onerror = ()=>reject(reader.error)
			reader.readAsDataURL(b)
		})
		default: throw new Error('invalid preload type: '+type)
	}
}

/*************** 应用运行环境 ***************/
//运行SPA所必需
//不检查合法性
function runApp(app, option={}){
	//问题：副作用难以定位/清理
	//运行时副作用（全局变量、监听器等）通过重启框架来刷新
	//持久性副作用包括但不限于：localStorage、IndexedDB、Cookie
	document.head.innerHTML = ''
	document.head.append($.title({}, app.name))
	if(app.icon)
		setIcon(app.icon)
	document.body.replaceWith($.body()) //清空元素、样式、监听器
	document.adoptedStyleSheets = []
	let modules = Object.create(null),
		running_modules = Object.create(null)
	function runModule(name){
		if(running_modules[name])
			throw new Error('loop require: '+name)
		let script = app.scripts[name]
		if(script==undefined)
			throw new Error('module not found: '+name)
		
		running_modules[name] = true
		script = `//${name}\n"use strict";\n${script}`
		let res = Function('require', script)(makeRequire(name))
		delete running_modules[name]
		modules[name] = res
		return res
	}
	function makeRequire(current){
		let i = current.lastIndexOf('/')
		let dir = i<0 ? '' : current.slice(0, i+1)
		return name => {
			if(typeof name != 'string')
				throw new TypeError('name must be a string')
			if(name[0] == ':')
				return modules[name] //预加载模块
			if(name[0] == '/')
				name = name.slice(1)
			else if(name.startsWith('./'))
				name = dir + name.slice(2)
			else if(app.require_path)
				name = app.require_path +'/'+ name
			name += '.js'
			return name in modules ? modules[name] : runModule(name)
		}
	}
	//修改以下 API 须变更 API_VERSION
	globalThis.require = makeRequire('') //用于调试
	globalThis.Assets = app.assets
	modules[':spa'] = {$n, applyCSS, importFont, loadBlob, FileInput, DownloadBlob}
	
	let db_name = 'SPA::'+app.id
	modules[':idb'] = { //一个应用对应一个 idb，方便卸载时删除
		open: indexedDB.open.bind(indexedDB, db_name),
		deleteDatabase: indexedDB.deleteDatabase.bind(indexedDB, db_name),
		checkVersion: IDBStorage.checkVersion.bind(IDBStorage, db_name),
		storage(name){
			return new IDBStorage(db_name, name, KEY)
		}
	}
	
	if(app.id == 'debugger'){
		modules[':debug'] = {runApp}
	}
	
	runModule(app.main)
}

/*************** 包解析器 ***************/
const API_VERSION = 5
const MIN_VERSION = 2

function isCompatible(ver){
	return MIN_VERSION<=ver && ver<=API_VERSION
}
async function parsePackage(file){
	let {meta, blob} = await split(file)
	let {_ver=0, id, name, icon, files, author, desc, main, require_path} = meta
	if(!id)
		throw new Error('缺少 ID')
	if(!id.match(/^[a-z0-9-]+$/))
		throw new Error('ID 不合法')
	if(!isCompatible(_ver))
		throw new Error('版本不兼容')
	let assets = Object.create(null), scripts = Object.create(null)
	let index = 0
	for(let {name, size, type, preload} of files){
		let end = index+size
		if(end > blob.size)
			throw new Error('文件大小不匹配')
		let data = blob.slice(index, end)
		if(type == 'script'){
			scripts[name] = await data.text()
		}else{
			assets[name] = preload ? await loadBlob(data, preload) : data
		}
		index = end
	}
	if(index != blob.size)
		throw new Error('文件大小不匹配')
	if(!(main in scripts))
		throw new Error('缺少主模块')
	return {
		//runApp 需要的：
		id, name, icon, author, desc, assets, scripts, main, require_path,
		//addPackage 需要的（其实没有也行）：
		meta
	}
}

/*************** 包管理器 ***************/
//导出 MetaStore, pkgmanager
//通过 pkgmanager.init() 初始化
//使用 indexedDB: SPA-frame
//不检查合法性

let packagesStore, packagesMeta, MetaStore
let pkgmanager = {
	async init(){
		await IDBStorage.checkVersion('SPA-frame', 4, ['meta', 'packages', 'packages-meta'])
		MetaStore = new IDBStorage('SPA-frame', 'meta', KEY)
		packagesStore = new IDBStorage('SPA-frame', 'packages', KEY)
		packagesMeta = new IDBStorage('SPA-frame', 'packages-meta', KEY)
	},
	async list(){
		return packagesMeta.entries()
	},
	async addPackage(id, file, meta){
		meta ||= (await split(file)).meta
		meta.size = file.size
		await packagesMeta.set(id, meta)
		await packagesStore.set(id, file)
	},
	async removePackage(id, deleteData=true){
		await packagesMeta.del(id)
		await packagesStore.del(id)
		if(deleteData){
			let req = indexedDB.deleteDatabase('SPA::'+id)
			await Promise.fromIDBRequest(req)
		}
	},
	async getPackage(id){
		return packagesStore.get(id)
	},
	async getMeta(id){
		return packagesMeta.get(id)
	}
}

function getAutoRun(packages){
	let autoRun = AppId || InitParams.get('auto_run')
	if(!autoRun)return
	for(let [id, meta] of packages){
		if(id==autoRun)return id
	}
}
function getFetchURL(){
	let url = InitParams.get('fetch_url')
	if(url && url.startsWith('/')) //仅允许相对url
		return url
	if(AppId && !url)
		return OFFICIAL_PACKAGE_PATH+AppId
	return null
}
function fetchApp(id, url){ //保证有 url，但不一定有 id
	document.body.style.textAlign = 'center'
	applyCSS(`
		@keyframes pulse {
			0% { opacity: 0.6; }
			50% { opacity: 1; }
			100% { opacity: 0.6; }
		}
	`)
	
	let title = $.h3({}, '正在远程加载应用')
	let progressText = $.span({}, '正在连接')
	let progressLabel = $.div({}, ['当前进度：', progressText])
	let progressBar = $.div({
		style: {
			width: '0%',
			height: '100%',
			background: 'linear-gradient(90deg, #3498db, #9b59b6)',
			transition: 'width 0.3s ease'
		}
	})
	let progressBarContainer = $.div({
		style: {
			width: '80%',
			height: '20px',
			backgroundColor: '#f0f0f0',
			borderRadius: '10px',
			margin: '10px auto',
			overflow: 'hidden'
		},
		content: [progressBar]
	})
	
	let urlLabel = $.div({}, ['url: ', $.a({content:url, href:url})])
	let cancelBtn = $.button({
		content: '取消',
		style: btnStyle,
		onclick(){
			if(IS_OFFICIAL)
				location.href = OFFICIAL_ORIGIN
			else
				location.search = ''
		}
	})
	
	document.body.append(title, progressLabel, progressBarContainer, urlLabel, cancelBtn)
	
	function onProgress({loaded, total}){
		let text = getSizeText(loaded)
		if(total) {
			text += ' / '+getSizeText(total)
			let percentage = Math.round((loaded / total) * 100)
			progressBar.style.width = percentage + '%'
		} else {
			// 如果没有总大小信息，显示脉冲动画
			progressBar.style.width = '100%'
			progressBar.style.backgroundColor = '#2196F3'
			progressBar.style.animation = 'pulse 1.5s infinite'
		}
		progressText.textContent = text
	}
	function onError(err){
		console.error(err)
		progressText.style.color = 'red'
		progressText.textContent = '获取软件包失败，详见控制台'
	}
	XHRPromise(url, {onProgress}).then(async res=>{
		if(!res.ok)
			return onError(res.status)
		let blob = await res.blob()
		installApp(blob, url) //todo: 检查id
	}, onError)
}

let userConfig = {

			label: '安装应用前确认',
			desc: '显示应用信息与来源',
			defVal: false
		},
		autoStartAfterInstall: {
			label: '安装后自动启动',
			desc: '安装完成立即运行',
			defVal: true
		}
	},
	async init(){
		this.data = await MetaStore.get('user-config') || {} //只存用户修改过的数据
	},
	get(key){
		return this.data[key] ?? this.items[key]?.defVal
	},
	async set(key, val){
		this.data[key] = val
		await MetaStore.set('user-config', this.data)
	}

function setOnDropFile(el, fn){
	el.addEventListener('dragover', e=>e.preventDefault())
	el.addEventListener('drop', e=>{
		e.preventDefault()
		fn(e.dataTransfer.files[0])
	})
}
function getSizeText(size){
	let unit = 'B'
	if(size>1024){
		size /= 1024
		unit = 'KB'
	if(size>1024){
		size /= 1024
		unit = 'MB'
	if(size>1024){
		size /= 1024
		unit = 'GB'
	}}}
	size = Math.round(size*100) / 100
	return size+' '+unit
}

			style: {...btnStyle, background:'#ef4444'},

		}),

			detailPanel.append($.div({content: '选择一个应用以查看详细信息', style:{fontWeight:'700', color:'#0f172a'}}))
			detailPanel.append($.div({content: '点击列表中的卡片查看 meta、文件清单并进行导出/删除/启动等操作。', style:{fontSize:'13px', color:'#6b7280'}}))
		}

				cursor: 'pointer'

					style: {background:'#06b6d4', color:'#fff', border:'none', padding:'8px 10px', borderRadius:'8px', cursor:'pointer', fontWeight:'600'}

function refreshList(){
	return pkgmanager.list().then(displayList)
}

function runAppWithAlert(app){
	try{
		runApp(app)
	}catch(err){
		if(!globalThis.DEBUGGING)
			alert('启动失败')
		throw err //console.error 无法定位 VM 源码
	}
}
async function installApp(file, source='本地文件'){
	let dialog = createInstallPopup()
	dialog.showParse()
	let app
	try{
		app = await parsePackage(file)
	}catch(err){
		dialog.showFail('解析失败：\n'+err.message)
		return
	}
	if(userConfig.get('confirmBeforeInstall')){
		try{
			let existing = await pkgmanager.getMeta(app.id)
			let oldVer = existing?.version || '未知'
			let newVer = app.meta.version || '未知'
			let info = {
				icon: app.icon,
				name: app.name,
				id: app.id,
				version: existing ? oldVer+' → '+newVer : newVer,
				desc: app.desc,
				source
			}
			await new Promise((resolve, reject) => {
				dialog.showInstallConfirm(info, resolve, reject)
			})
		}catch(err){
			//取消安装
			return
		}
	}
	dialog.showInstalling()
	await pkgmanager.addPackage(app.id, file, app.meta)
	if(userConfig.get('autoStartAfterInstall')){
		runAppWithAlert(app)
	}else{
		await refreshList()
		dialog.showComplete(()=>runAppWithAlert(app))
	}
}
function createInstallPopup() {
	const title = $.div({ style: {fontSize:'18px', fontWeight:'700', color:'#0f172a'} })
	const content = $.div({ style: {fontSize:'14px', color:'#374151', lineHeight:1.5} })
	const actions = $.div({ style: {display:'flex', gap:'10px', justifyContent:'flex-end', marginTop:'4px'} })

	// 清空内容
	function clear() {
		title.textContent = ''
		content.innerHTML = ''
		actions.innerHTML = ''
	}

	function createBtn(content, customStyle, onclick) {
		return $.button({
			content,
			onclick,
			style: {
				border: 'none',
				borderRadius: '8px',
				padding: '8px 16px',
				fontSize: '14px',
				fontWeight: '500',
				cursor: 'pointer',
				...customStyle
			}
		})
	}

	const dialog = createPopup({
		style: {
			background: '#fff',
			borderRadius: '14px',
			width: '90vw',
			maxWidth: '400px',
			padding: '22px',
			boxShadow: '0 12px 32px rgba(0,0,0,0.18)',
			display: 'flex',
			flexDirection: 'column',
			gap: '16px'
		},
		content: [title, content, actions],
		showParse() {
			clear()
			title.textContent = '正在解析应用包'
			content.textContent = '正在读取应用信息，请稍候…'
			/* actions.append(createBtn('取消', {
				background: '#ef4444', color: '#fff'
			}, () => this.close())) */
		},
		showInstallConfirm({icon=ICONS.APP, name, id, version='未知', desc='暂无描述', source='未知'}, onConfirm, onCancel) {
			clear()
			title.textContent = '确认安装应用'

			content.append(
				$.div({style:"display: flex; align-items: center; gap: 12px; margin-bottom: 12px;"}, [
					$.img({src:icon, style:"width: 48px; height: 48px; border-radius: 8px; object-fit: cover;"}),
					$.div({}, [
						$.div({style:"font-weight: 600; font-size: 16px;"}, name),
						$.div({style:"color: #6b7280;"}, 'ID:'+id),
						$.div({style:"color: #6b7280; fontSize:12px"}, '版本：'+version)
					])
				]),
				$.div({style:"margin-bottom: 6px; white-space: pre-wrap;"}, '描述：'+desc),
				$.div({}, '来源：'+source)
			)

			actions.append(
				createBtn('取消', { background: '#6b7280', color: '#fff' }, ()=>{ this.close(); onCancel?.() }),
				createBtn('确认安装', { background: '#06b6d4', color: '#fff' }, onConfirm)
			)
		},
		showInstalling() {
			clear()
			title.textContent = '正在安装'
			content.textContent = '应用正在安装到本地数据库，请稍候…'
			/* actions.append(createBtn('等待…', {
				background: '#d1d5db', color: '#6b7280', cursor: 'not-allowed'
			})) */
		},
		showComplete(launchFn) {
			clear()
			title.textContent = '安装成功'
			content.textContent = '应用已成功安装到本地数据库。'
			actions.append(
				createBtn('完成', { background: '#6b7280', color: '#fff' }, () => this.close()),
				createBtn('打开', { background: '#06b6d4', color: '#fff' }, () => { this.close(); launchFn() })
			)
		},
		showFail(errMsg='未知错误') {
			clear()
			title.textContent = '安装失败'
			content.textContent = errMsg
			actions.append(createBtn('关闭', {
				background: '#ef4444', color: '#fff'
			}, () => this.close()))
		}
	})

	return dialog
}
async function launchApp(file){
	let app
	try{
		app = await parsePackage(file)
	}catch(err){
		alert('解析失败：\n'+err.message)
		console.error(err)
		return
	}
	runAppWithAlert(app)
}
